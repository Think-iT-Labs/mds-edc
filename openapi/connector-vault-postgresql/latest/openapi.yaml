  /v3/contractagreements/retirements/request:
    post:
      description: Get all retired contract agreements.
      operationId: getAllRetiredV3
      responses:
        "200":
          description: A list of retired contract agreements
        "400":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail_1"
                type: array
          description: Request body was malformed
      tags:
      - Agreements Retirement
  /{any}:
    delete:
      description: Send `DELETE` data query to the Data Plane.
      operationId: delete
      responses:
        "400":
          description: Missing access token
        "403":
          description: Access token is expired or invalid
        "500":
          description: Failed to transfer data
      tags:
      - Data Plane public API
    get:
      description: Send `GET` data query to the Data Plane.
      operationId: get
      responses:
        "400":
          description: Missing access token
        "403":
          description: Access token is expired or invalid
        "500":
          description: Failed to transfer data
      tags:
      - Data Plane public API
    head:
      description: Send `HEAD` data query to the Data Plane.
      operationId: head
      responses:
        "400":
          description: Missing access token
        "403":
          description: Access token is expired or invalid
        "500":
          description: Failed to transfer data
      tags:
      - Data Plane public API
    patch:
      description: Send `PATCH` data query to the Data Plane.
      operationId: patch
      responses:
        "400":
          description: Missing access token
        "403":
          description: Access token is expired or invalid
        "500":
          description: Failed to transfer data
      tags:
      - Data Plane public API
    post:
      description: Send `POST` data query to the Data Plane.
      operationId: post
      responses:
        "400":
          description: Missing access token
        "403":
          description: Access token is expired or invalid
        "500":
          description: Failed to transfer data
      tags:
      - Data Plane public API
    put:
      description: Send `PUT` data query to the Data Plane.
      operationId: put
      responses:
        "400":
          description: Missing access token
        "403":
          description: Access token is expired or invalid
        "500":
          description: Failed to transfer data
      tags:
      - Data Plane public API
  /v3/transferprocesses/{id}/suspend:
    post:
      deprecated: true
      description: "Requests the suspension of a transfer process. Due to the asynchronous\
        \ nature of transfers, a successful response only indicates that the request\
        \ was successfully received. This may take a long time, so clients must poll\
        \ the /{id}/state endpoint to track the state."
      operationId: suspendTransferProcessV3
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuspendTransferV3"
      responses:
        "204":
          description: Request to suspend the transfer process was successfully received
          links:
            poll-state:
              operationId: suspendTransferProcessV3
        "400":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: "Request was malformed, e.g. id was null"
        "404":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: A transfer process with the given ID does not exist
        "409":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: "Could not suspend the transfer process, because it is already\
            \ completed or terminated."
      tags:
      - Transfer Process V3
  /v3/contractnegotiations/{id}/approve:
    post:
      description: Approve a pending negotiation
      operationId: approveNegotiation
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        default:
          content:
            '*/*': {}
          description: default response
      tags:
      - Manual Negotiation Approval
