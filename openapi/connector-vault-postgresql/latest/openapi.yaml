openapi: 3.0.1
info:
  description: merged spec
  title: merged spec
  version: 1.0.0
servers:
- url: /
paths:
  /v4/transferprocesses/{id}:
    get:
      description: Gets an transfer process with the given ID
      operationId: getTransferProcessV4
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/transfer-process-schema"
          description: The transfer process
        "400":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api-error-schema"
                type: array
          description: "Request was malformed, e.g. id was null"
        "404":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api-error-schema"
                type: array
          description: A transfer process with the given ID does not exist
      tags:
      - Transfer Process v4
  /v3/assets/request:
    post:
      deprecated: true
      description: Request all assets according to a particular query
      operationId: requestAssetsV3
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuerySpec"
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/AssetOutputV3"
                type: array
          description: The assets matching the query
        "400":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: Request body was malformed
      tags:
      - Asset V3
  /v3/assets/{id}:
    delete:
      deprecated: true
      description: "Removes an asset with the given ID if possible. Deleting an asset\
        \ is only possible if that asset is not yet referenced by a contract agreement,\
        \ in which case an error is returned. DANGER ZONE: Note that deleting assets\
        \ can have unexpected results, especially for contract offers that have been\
        \ sent out or ongoing or contract negotiations."
      operationId: removeAssetV3
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Asset was deleted successfully
        "400":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: "Request was malformed, e.g. id was null"
        "404":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: An asset with the given ID does not exist
        "409":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: "The asset cannot be deleted, because it is referenced by a\
            \ contract agreement"
      tags:
      - Asset V3
    get:
      deprecated: true
      description: Gets an asset with the given ID
      operationId: getAssetV3
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetOutputV3"
          description: The asset
        "400":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: "Request was malformed, e.g. id was null"
        "404":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiErrorDetail"
                type: array
          description: An asset with the given ID does not exist
      tags:
      - Asset V3
  /v3/catalogs/request:
    post:
      deprecated: true
      description: Obtains all catalogs currently held by this cache instance
      operationId: requestCatalogsV3
      parameters:
      - in: query
        name: flatten
        schema:
          default: false
          type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuerySpec"
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/CatalogV3"
                type: array
          description: "A list of catalogs is returned, potentially empty"
        "500":
          description: A query could not be completed due to an internal error
      tags:
      - Catalogs V3
  /v4/policydefinitions:
    post:
      description: Creates a new policy definition
      operationId: createPolicyDefinitionV4
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/policy-definition-schema"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/id-response-schema"
          description: policy definition was created successfully. Returns the Policy
            Definition Id and created timestamp
        "400":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api-error-schema"
                type: array
          description: Request body was malformed
        "409":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api-error-schema"
                type: array
          description: "Could not create policy definition, because a contract definition\
            \ with that ID already exists"
      tags:
      - Policy Definition v4
  /v4/assets/{id}:
    delete:
      description: "Removes an asset with the given ID if possible. Deleting an asset\
